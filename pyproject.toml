[tool.ruff]
target-version = "py312"
line-length = 100

exclude = [
    ".venv",
    "__pycache__",
    ".git",
    "build",
    "dist",
    "alembic/versions",
    "migrations",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP",
    "SIM",
    "ASYNC",
    "PERF",
    "RUF",
]

ignore = [
    "B008",
    "RUF002",
    "RUF001",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]
"**/__init__.py" = ["F401"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
