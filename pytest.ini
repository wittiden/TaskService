[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning

pythonpath = .

addopts = -q --disable-warnings --maxfail=1 --tb=short

log_cli = true
log_cli_level = WARNING

markers =
    slow: slow tests
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
