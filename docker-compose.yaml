services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: task_service:2.0
    container_name: task_service_app
    labels:
      - author=wittiden
      - version=2.0.0
      - project=TaskService
    ports:
      - "${SERVER_PORT}:8000"
    stop_grace_period: 30s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - network
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health"]
      interval: 5s
      retries: 3
    develop:
      watch:
        - action: sync+restart
          target: .
          path: /app
        - action: rebuild
          path: requirements.txt

  db:
    image: postgres:16-alpine
    container_name: task_service_db
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - network
    ports:
      - "${DB_PORT}:5432"
    environment:
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
    volumes:
      - db_volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: task_service_pgadmin
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - network
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASS}
    volumes:
      - pgadmin_volume:/var/lib/pgadmin
    profiles:
      - pgadmin
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost/misc/ping" ]
      interval: 30s
      timeout: 10s
      retries: 5


networks:
  network:
    driver: bridge
    name: task_service_network


volumes:
  db_volume:
    name: task_service_db_volume
  pgadmin_volume:
    name: task_service_pgadmin_volume
