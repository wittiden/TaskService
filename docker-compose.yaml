services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    labels:
      - author=wittiden
      - project=TaskService
      - version=2.0.0
    image: task_service_app:1.0.0
    container_name: task_service_app
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - network
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health"]
      interval: 5s
      retries: 3
    ports:
      - "${SERVER_PORT}:8000"
    develop:
      watch:
        - action: sync+restart
          target: .
          path: /app
        - action: rebuild
          path: requirements.txt

  migrations:
    image: task_service_migrations:1.0.0
    container_name: task_service_migrations
    build:
      context: .
    command: ["alembic", "upgrade", "head"]
    restart: no
    volumes:
      - .:/app
    networks:
      - network
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrations

  db:
    image: postgres:16-alpine
    container_name: task_service_db
    restart: unless-stopped
    networks:
      - network
    environment:
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
    volumes:
      - db_volume:/var/lib/postgresql/data
    stop_grace_period: 30s
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: task_service_pgadmin
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - network
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASS}
    volumes:
      - pgadmin_volume:/var/lib/pgadmin
    profiles:
      - pgadmin
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost/misc/ping" ]
      interval: 30s
      timeout: 10s
      retries: 5


volumes:
  db_volume:
    name: task_service_db_volume
  pgadmin_volume:
    name: task_service_pgadmin_volume


networks:
  network:
    driver: bridge
    name: task_service_network
